<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercice 1 — Connexion (template)</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page page--narrow">
      <nav class="exo-nav" aria-label="Navigation">
        <a href="index.html">← Accueil</a>
        <span class="exo-nav-sep">·</span>
        <a href="qcm.html">Exercice 2 →</a>
      </nav>

      <header class="page-header">
        <div class="titles">
          <h1>Exercice 1 — Page de connexion</h1>
          <p class="subtitle">
            Le HTML est prêt. À vous de compléter <code>connexion.js</code>.
          </p>
        </div>
      </header>

      <section class="panel connexion-card">
        <h2 class="exo-title">Connexion</h2>
        <p class="exo-lead">Identifiants factices (à vérifier en JavaScript).</p>

        <form id="login-form" autocomplete="off">
          <label for="login">Identifiant</label>
          <input id="login" type="text" placeholder="ex. demo" required />

          <label for="password">Mot de passe</label>
          <input id="password" type="password" placeholder="ex. code123" required />

          <button type="submit">Se connecter</button>
        </form>

        <p id="message" aria-live="polite"></p>
      </section>

      <footer>
        <p>Script : <code>connexion.js</code></p>
      </footer>
    </div>

    <script src="connexion.js"></script>
  </body>
</html>
